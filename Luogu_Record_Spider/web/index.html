<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="global-close-btn" class="close-btn" onclick="closeApp()">×</div>

    <div id="login-container">
        <div class="card" id="login-card">
            <h2>用户登录</h2>
            <div id="login-form">
                <input type="text" id="username" placeholder="用户名">
                <input type="password" id="password" placeholder="密码">
                <button id="login-btn" onclick="submitLogin()">登 录</button>
                <div id="message" style="color:red; margin-top:10px; font-size:12px;"></div>
            </div>
            <div id="loading-overlay" class="hidden" style="margin-top:20px;">
                <div style="color: #666;">正在连接系统...</div>
            </div>
        </div>
    </div>

    <div id="main-interface">
        <div class="navbar">
            <div class="logo">Luogu Monitor Pro</div>
            <div class="user-profile" onclick="toggleDropdown()">
                <span class="user-name" id="display-username">User</span>
                <div class="avatar" id="display-avatar">U</div>
                <div class="dropdown-menu" id="user-menu">
                    <div class="dropdown-item" onclick="handleLogout(event)">退出登录</div>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="dashboard-card">
                <h3>监控控制台</h3>
                <p>当前状态：<span style="color: #53c41a; font-weight: bold;">运行中</span></p>
                <p style="font-size: 13px; color: #666;">后台自动抓取中。新提交将触发双重弹窗提醒。</p>
                <div style="margin-top: 15px;">
                    <button class="action-btn" onclick="openConfigModal()">📋 管理监控名单</button>
                </div>
            </div>

            <div class="dashboard-card leaderboard-section" style="margin-top: 20px;">
                <h3>提交排行榜</h3>
                
                <div class="filter-bar">
                    <div class="filter-item">
                        <label>时间范围：</label>
                        <select id="filter-days" onchange="handleTimeFilterChange()">
                            <option value="7">近7天</option>
                            <option value="30">近30天</option>
                            <option value="90">近90天</option>
                            <option value="0">全部时间</option>
                            <option value="custom">自定义</option>
                        </select>
                        <input type="number" id="custom-days-input" placeholder="天数" min="1" style="width: 70px; display: none;">
                    </div>

                    <div class="filter-item">
                        <label>最低难度：</label>
                        <div id="min-difficulty-dropdown" class="custom-select"></div>
                        <select id="filter-min-lv" style="display:none;">
                            <option value="0">入门</option>
                            <option value="1">普及−</option>
                            <option value="2">普及/提高−</option>
                            <option value="3">普及+/提高</option>
                            <option value="4">提高+/省选</option>
                            <option value="5">省选/NOI−</option>
                            <option value="6">NOI/CTSC</option>
                        </select>
                    </div>

                    <div class="filter-item"><label>至</label></div>

                    <div class="filter-item">
                        <label>最高难度：</label>
                        <div id="max-difficulty-dropdown" class="custom-select"></div>
                        <select id="filter-max-lv" style="display:none;">
                            <option value="0">入门</option>
                            <option value="1">普及−</option>
                            <option value="2">普及/提高−</option>
                            <option value="3">普及+/提高</option>
                            <option value="4">提高+/省选</option>
                            <option value="5">省选/NOI−</option>
                            <option value="6" selected>NOI/CTSC</option>
                        </select>
                    </div>

                    <button class="search-btn" onclick="loadLeaderboard()">查询</button>
                </div>

                <div class="table-container">
                    <table id="leaderboard-table">
                        <thead>
                            <tr>
                                <th width="60">排名</th>
                                <th>用户</th>
                                <th width="100">通过数</th>
                                <th width="80">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="4" style="text-align:center; color:#999;">点击查询加载数据</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="config-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3>监控名单管理</h3>
                <span class="close-icon" onclick="closeConfigModal()">×</span>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <input type="text" id="new-uid-input" placeholder="输入用户 ID (如 102468)">
                    <button class="add-btn" onclick="addUidItem()">添加</button>
                </div>
                <div class="uid-list-container">
                    <p style="font-size: 12px; color: #666; margin-bottom: 5px;">当前监控的用户列表：</p>
                    <div id="uid-tags-area" class="tags-area"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeConfigModal()">取消</button>
                <button class="save-btn" onclick="saveConfig()">保存并重启监控</button>
            </div>
        </div>
    </div>

    <div id="user-detail-modal" class="modal-overlay hidden user-detail-modal">
        <div class="modal-card" style="width: 620px; max-height: 85vh;">
            <div class="modal-header">
                <h3>用户提交记录: <span id="detail-username"></span></h3>
                <span class="close-icon" onclick="closeUserDetailModal()">×</span>
            </div>
            <div class="modal-body" style="padding: 0;">
                <div style="padding: 10px 15px; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 8px;">
                    <label style="font-size:13px;">题目难度：</label>
                    <div id="detail-difficulty-dropdown" class="custom-select"></div>
                    <select id="detail-difficulty-filter" style="display:none;">
                        <option value="">全部</option>
                        <option value="入门">入门</option>
                        <option value="普及−">普及−</option>
                        <option value="普及/提高−">普及/提高−</option>
                        <option value="普及+/提高">普及+/提高</option>
                        <option value="提高+/省选">提高+/省选</option>
                        <option value="省选/NOI−">省选/NOI−</option>
                        <option value="NOI/NOI+/CTSC">NOI/CTSC</option>
                    </select>
                </div>
                <div class="record-list-header">
                    <span style="flex:1">时间</span>
                    <span style="flex:2">题目</span>
                    <span style="flex:1; text-align:right;">难度</span>
                </div>
                <div id="user-record-list" class="record-list-container"></div>
                <div class="pagination-bar">
                    <button id="prev-page-btn" onclick="changePage(-1)">上一页</button>
                    <span id="page-info">第 1 页</span>
                    <button id="next-page-btn" onclick="changePage(1)">下一页</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notification-container"></div>

    <script>
        // ---------- 难度颜色映射 ----------
        const DIFF_LABEL_COLORS = {
            "入门": "#fe4c61",
            "普及−": "#f39c11",
            "普及/提高−": "#ffc116",
            "普及+/提高": "#53c41a",
            "提高+/省选": "#3498db",
            "省选/NOI−": "#9c3dcf",
            "NOI/CTSC": "#0e1d69",
            "全部": "#aaa"
        };

        function getColorByLabel(label) {
            return DIFF_LABEL_COLORS[label] || '#aaa';
        }

        // ---------- 全局变量 ----------
        let currentMonitorList = [];
        let currentDetailUid = null;
        let currentDetailPage = 1;

        // ---------- 自定义下拉组件 ----------
        function createCustomDropdown(containerId, selectId, onChangeCallback) {
            const container = document.getElementById(containerId);
            const select = document.getElementById(selectId);
            if (!container || !select) return;

            container.innerHTML = '';
            const options = Array.from(select.options);

            const trigger = document.createElement('div');
            trigger.className = 'select-trigger';
            container.appendChild(trigger);

            const dropdown = document.createElement('div');
            dropdown.className = 'select-dropdown';
            container.appendChild(dropdown);

            options.forEach(opt => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'select-option';
                optionDiv.textContent = opt.text;
                const bgColor = getColorByLabel(opt.text);
                optionDiv.style.backgroundColor = bgColor;
                optionDiv.dataset.value = opt.value;

                optionDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    select.value = opt.value;
                    updateTriggerDisplay(trigger, opt.text, bgColor);
                    dropdown.classList.remove('show');
                    trigger.classList.remove('open');
                    if (onChangeCallback) onChangeCallback(opt.value);
                });

                dropdown.appendChild(optionDiv);
            });

            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpen = dropdown.classList.contains('show');
                document.querySelectorAll('.select-dropdown.show').forEach(d => d.classList.remove('show'));
                document.querySelectorAll('.select-trigger.open').forEach(t => t.classList.remove('open'));
                if (!isOpen) {
                    dropdown.classList.add('show');
                    trigger.classList.add('open');
                }
            });

            document.addEventListener('click', () => {
                dropdown.classList.remove('show');
                trigger.classList.remove('open');
            });

            const initOption = select.options[select.selectedIndex];
            const initText = initOption.text;
            const initColor = getColorByLabel(initText);
            updateTriggerDisplay(trigger, initText, initColor);

            container._updateDisplay = (value) => {
                const idx = Array.from(options).findIndex(o => o.value === value);
                if (idx >= 0) {
                    const opt = options[idx];
                    const color = getColorByLabel(opt.text);
                    updateTriggerDisplay(trigger, opt.text, color);
                    select.value = value;
                }
            };
        }

        function updateTriggerDisplay(trigger, text, bgColor) {
            trigger.innerHTML = `${text} <span class="select-arrow">▼</span>`;
            trigger.style.backgroundColor = bgColor;
        }

        function initAllDropdowns() {
            createCustomDropdown('min-difficulty-dropdown', 'filter-min-lv');
            createCustomDropdown('max-difficulty-dropdown', 'filter-max-lv');
            createCustomDropdown('detail-difficulty-dropdown', 'detail-difficulty-filter', () => {
                loadUserPage();
            });
        }

        function resetDetailDropdown() {
            const container = document.getElementById('detail-difficulty-dropdown');
            if (container && container._updateDisplay) {
                container._updateDisplay('');
            }
            document.getElementById('detail-difficulty-filter').value = '';
        }

        // ---------- 初始化 ----------
        function waitForPywebview() {
            if (window.pywebview) initCheck();
            else setTimeout(waitForPywebview, 100);
        }

        async function initCheck() {
            try {
                const res = await pywebview.api.init_check();
                if (res.status === 'success') showWelcome(res.username);
                else document.getElementById('loading-overlay').classList.add('hidden');
            } catch (e) {}
        }

        async function submitLogin() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const overlay = document.getElementById('loading-overlay');
            if(!userIn || !passIn) return alert("请输入账号密码");
            btn.disabled = true; overlay.classList.remove('hidden');
            try {
                const res = await pywebview.api.attempt_login(userIn, passIn);
                if (res.status === 'success') showWelcome(res.username);
                else { alert(res.message); btn.disabled = false; overlay.classList.add('hidden'); }
            } catch (e) { alert(e); btn.disabled = false; overlay.classList.add('hidden'); }
        }

        function showWelcome(username) {
            pywebview.api.start_monitoring(username);
            document.getElementById('display-username').innerText = username;
            document.getElementById('display-avatar').innerText = username.charAt(0).toUpperCase();
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('login-container').style.display = 'none';
            const main = document.getElementById('main-interface');
            main.style.opacity = '1'; main.style.pointerEvents = 'auto';
            loadLeaderboard();
        }

        function handleTimeFilterChange() {
            const select = document.getElementById('filter-days');
            const customInput = document.getElementById('custom-days-input');
            customInput.style.display = select.value === 'custom' ? 'inline-block' : 'none';
        }

        function getSelectedDays() {
            const select = document.getElementById('filter-days');
            if (select.value === 'custom') {
                const customVal = document.getElementById('custom-days-input').value;
                return customVal || '0';
            }
            return select.value;
        }

        async function loadLeaderboard() {
            const days = getSelectedDays();
            const minLv = document.getElementById('filter-min-lv').value;
            const maxLv = document.getElementById('filter-max-lv').value;
            const tbody = document.querySelector('#leaderboard-table tbody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">加载中...</td></tr>';
            try {
                const res = await pywebview.api.get_leaderboard_data(days, minLv, maxLv);
                if(res.status === 'success') renderLeaderboard(res.data);
                else alert(res.message);
            } catch(e) { alert("查询失败: " + e); }
        }

        function renderLeaderboard(data) {
            const tbody = document.querySelector('#leaderboard-table tbody');
            tbody.innerHTML = '';
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#999; padding:20px;">该范围内无提交记录</td></tr>';
                return;
            }
            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                let rankStr = index + 1;
                if(index === 0) rankStr = '🥇 1';
                if(index === 1) rankStr = '🥈 2';
                if(index === 2) rankStr = '🥉 3';
                tr.innerHTML = `
                    <td style="text-align:center; font-weight:bold;">${rankStr}</td>
                    <td>${item.user_name} <span style="font-size:12px; color:#999;">(${item.user_id})</span></td>
                    <td style="text-align:center; color:#53c41a; font-weight:bold;">${item.count}</td>
                    <td style="text-align:center;"><button class="small-btn" onclick="openUserDetail('${item.user_id}')">详情</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openUserDetail(uid) {
            currentDetailUid = uid;
            currentDetailPage = 1;
            resetDetailDropdown();
            document.getElementById('user-detail-modal').classList.remove('hidden');
            loadUserPage();
        }

        async function loadUserPage() {
            const container = document.getElementById('user-record-list');
            container.innerHTML = '<div style="padding:20px; text-align:center;">加载中...</div>';
            const difficulty = document.getElementById('detail-difficulty-filter').value;
            try {
                const res = await pywebview.api.get_user_records_page(currentDetailUid, currentDetailPage, difficulty);
                if(res.status === 'success') {
                    document.getElementById('detail-username').innerText = res.user_name;
                    renderRecordList(res.data);
                    updatePagination(res.total);
                } else {
                    container.innerHTML = `<div style="color:red; text-align:center;">${res.message}</div>`;
                }
            } catch(e) { alert("获取详情失败: " + e); }
        }

        function renderRecordList(records) {
            const container = document.getElementById('user-record-list');
            container.innerHTML = '';
            if(records.length === 0) {
                container.innerHTML = '<div style="padding:20px; text-align:center; color:#999;">本页无数据</div>';
                return;
            }
            records.forEach(r => {
                const row = document.createElement('div');
                row.className = 'record-row';
                row.innerHTML = `
                    <span style="flex:1; font-size:13px; color:#666;">${r.post_date}</span>
                    <span style="flex:2; font-weight:500;">${r.problem_name} <span style="font-size:12px;color:#999;">(${r.problem_number})</span></span>
                    <span style="flex:1; text-align:right;">
                        <span class="diff-tag" style="background-color:${r.color}">${r.difficulty}</span>
                    </span>
                `;
                container.appendChild(row);
            });
        }

        function updatePagination(total) {
            const pageSize = 10;
            const totalPages = Math.ceil(total / pageSize) || 1;
            document.getElementById('page-info').innerText = `第 ${currentDetailPage} / ${totalPages} 页 (共 ${total} 条)`;
            document.getElementById('prev-page-btn').disabled = (currentDetailPage <= 1);
            document.getElementById('next-page-btn').disabled = (currentDetailPage >= totalPages);
        }

        function changePage(delta) {
            currentDetailPage += delta;
            loadUserPage();
        }

        function closeUserDetailModal() {
            document.getElementById('user-detail-modal').classList.add('hidden');
        }

        // ---------- 监控配置 ----------
        async function openConfigModal() {
            document.getElementById('config-modal').classList.remove('hidden');
            document.getElementById('uid-tags-area').innerHTML = '加载中...';
            try {
                const res = await pywebview.api.get_monitor_config();
                if(res.status === 'success') {
                    currentMonitorList = res.data;
                    renderConfigTags();
                }
            } catch(e) { alert(e); }
        }

        function renderConfigTags() {
            const container = document.getElementById('uid-tags-area');
            container.innerHTML = '';
            if(!currentMonitorList.length) {
                container.innerHTML = '<span style="color:#999;">暂无</span>'; return;
            }
            currentMonitorList.forEach((item, idx) => {
                const tag = document.createElement('div');
                tag.className = 'uid-tag';
                tag.innerHTML = `${item.name}: ${item.id} <span onclick="removeMonitorItem(${idx})">×</span>`;
                container.appendChild(tag);
            });
        }

        function addUidItem() {
            const val = document.getElementById('new-uid-input').value.trim();
            if(!val) return;
            if(currentMonitorList.some(i => i.id === val)) return alert("已存在");
            currentMonitorList.push({id: val, name: "新增"});
            renderConfigTags();
            document.getElementById('new-uid-input').value = '';
        }

        function removeMonitorItem(idx) {
            currentMonitorList.splice(idx, 1);
            renderConfigTags();
        }

        async function saveConfig() {
            const btn = document.querySelector('#config-modal .save-btn');
            btn.innerText = "保存中..."; btn.disabled = true;
            const idsOnly = currentMonitorList.map(item => item.id);
            try {
                const res = await pywebview.api.save_monitor_config(idsOnly);
                if(res.status === 'success') {
                    alert("保存成功，监控已重启");
                    closeConfigModal();
                } else alert(res.message);
            } catch(e) { alert(e); }
            btn.innerText = "保存并重启监控"; btn.disabled = false;
        }
        function closeConfigModal() { document.getElementById('config-modal').classList.add('hidden'); }

        // ---------- 通知 ----------
        function createNotificationCard(data) {
            const container = document.getElementById('notification-container');
            const card = document.createElement('div');
            card.className = 'notify-card';
            card.style.borderLeft = `5px solid ${data.color}`;
            card.innerHTML = `
                <div class="notify-header"><span class="notify-user">${data.user_name}</span><span class="notify-time">${data.time_str}</span></div>
                <div class="notify-body">提交了 <b>${data.problem_number}</b><div class="notify-pname">${data.problem_name}</div></div>
                <div class="notify-footer"><span class="difficulty-badge" style="background:${data.color}">${data.difficulty}</span></div>
                <div class="notify-close" onclick="this.parentElement.remove()">×</div>`;
            container.appendChild(card);
            setTimeout(() => { card.classList.add('fade-out'); setTimeout(()=>card.remove(),500); }, 8000);
        }

        function toggleDropdown() { document.getElementById('user-menu').classList.toggle('active'); }
        window.onclick = e => { if(!e.target.closest('.user-profile')) document.getElementById('user-menu').classList.remove('active'); }
        async function handleLogout(e) { e.stopPropagation(); await pywebview.api.logout(); location.reload(); }
        function closeApp() { pywebview.api.close_app(); }

        // 启动
        window.addEventListener('load', () => {
            handleTimeFilterChange();
            initAllDropdowns();
        });

        waitForPywebview();
    </script>
</body>
</html>
